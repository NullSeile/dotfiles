# Bongo Cat — a cat that sits in your bar and slaps when you type or to the beat.
#
# Input reactivity needs `evtest` installed and your user in the `input` group;
# set input devices in the widget settings. Prefer stable /dev/input/by-id/ or
# /dev/input/by-path/ entries over /dev/input/eventN. Audio reactivity uses the
# PipeWire spectrum.

id = "nullptr/bongocat"
name = "Bongo Cat (kanata)"
version = "1.1.2"
author = "nullptr"
license = "MIT"
dependencies = []
icon = "cat"
plugin_api = 3
description = "A cat that slaps your bar when you type or to the beat."
tags = ["fun", "animation"]

[[widget]]
id = "cat (kanata)"
entry = "bongocat.luau"

  [[widget.setting]]
  key = "executable_path"
  type = "file"
  label_key = "settings.executable_path.label"
  default = "evtest"

  [[widget.setting]]
  key = "audio_spectrum"
  type = "bool"
  label_key = "settings.audio_spectrum.label"
  default = false

  [[widget.setting]]
  key = "tappy_mode"
  type = "bool"
  label_key = "settings.tappy_mode.label"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }

  [[widget.setting]]
  key = "rave_mode"
  type = "bool"
  label_key = "settings.rave_mode.label"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }

  [[widget.setting]]
  key = "use_mpris_filter"
  type = "bool"
  label_key = "settings.use_mpris_filter.label"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }
